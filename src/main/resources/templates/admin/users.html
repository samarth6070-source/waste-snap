<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="admin-main">
<div class="container-fluid p-0">
  <div class="row g-0">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="col-12 col-md-9 col-lg-10 d-flex flex-column">
      <div th:replace="~{fragments/admin-topnav :: topnav}"></div>
      <div class="p-4 flex-grow-1">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
          <div>
            <h1 class="h4 fw-bold text-dark mb-0">Users</h1>
            <p class="text-muted small mb-0">Registered accounts and reporting activity</p>
          </div>
          <span class="badge rounded-pill text-bg-secondary" th:text="${#lists.size(users)} + ' users'">0 users</span>
        </div>

        <div class="card admin-stat-card">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-admin table-hover align-middle mb-0">
                <thead>
                <tr>
                  <th class="ps-4">User</th>
                  <th class="text-center">Total</th>
                  <th class="text-center">Pending</th>
                  <th class="text-center">Resolved</th>
                  <th>Registered</th>
                  <th>Last login</th>
                  <th class="pe-4">Last report</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(users)}">
                  <td colspan="7" class="text-center text-muted py-5">No users registered yet.</td>
                </tr>
                <tr th:each="u : ${users}">
                  <td class="ps-4">
                    <div class="fw-semibold text-dark" th:text="${#strings.isEmpty(u.displayName) ? u.email : u.displayName}">user</div>
                    <div class="small text-muted" th:text="${u.email}">email</div>
                  </td>
                  <td class="text-center"><span class="fw-semibold" th:text="${u.totalReports}">0</span></td>
                  <td class="text-center"><span class="badge rounded-pill text-bg-warning" th:text="${u.pendingReports}">0</span></td>
                  <td class="text-center"><span class="badge rounded-pill text-bg-success" th:text="${u.resolvedReports}">0</span></td>
                  <td class="text-muted small">
                    <span th:if="${u.createdAt != null}" th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd HH:mm')}">—</span>
                    <span th:if="${u.createdAt == null}">—</span>
                  </td>
                  <td class="text-muted small">
                    <span th:if="${u.lastLoginAt != null}" th:text="${#temporals.format(u.lastLoginAt, 'yyyy-MM-dd HH:mm')}">—</span>
                    <span th:if="${u.lastLoginAt == null}">—</span>
                  </td>
                  <td class="pe-4 text-muted small">
                    <span th:if="${u.lastReportAt != null}" th:text="${#temporals.format(u.lastReportAt, 'yyyy-MM-dd HH:mm')}">—</span>
                    <span th:if="${u.lastReportAt == null}">—</span>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
