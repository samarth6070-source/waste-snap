<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pending reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="admin-main">
<div class="container-fluid p-0">
  <div class="row g-0">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="col-12 col-md-9 col-lg-10 d-flex flex-column">
      <div th:replace="~{fragments/admin-topnav :: topnav}"></div>
      <div class="p-4 flex-grow-1">
        <div th:if="${clearedOk != null and clearedOk}" class="alert alert-success rounded-3" role="alert">
          Cleared <span class="fw-semibold" th:text="${clearedReports}">0</span> reports and
          <span class="fw-semibold" th:text="${clearedImages}">0</span> uploaded images.
        </div>
        <div th:if="${resolvedOk != null and resolvedOk}" class="alert alert-success rounded-3" role="alert">
          Report marked as resolved.
        </div>
        <div th:if="${resolvedOk != null and !resolvedOk}" class="alert alert-danger rounded-3" role="alert">
          Could not resolve the report (not found).
        </div>

        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
          <div>
            <h1 class="h4 fw-bold text-dark mb-0">Pending reports</h1>
            <p class="text-muted small mb-0">Items awaiting review and action</p>
          </div>
          <span class="badge rounded-pill text-bg-warning" th:text="${#lists.size(reports)} + ' open'">0 open</span>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-sm-6 col-xl-4">
            <div class="card admin-stat-card h-100">
              <div class="card-body">
                <div class="text-muted small">Queue depth</div>
                <div class="fs-3 fw-bold" th:text="${#lists.size(reports)}">0</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card admin-stat-card">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-admin table-hover align-middle mb-0">
                <thead>
                <tr>
                  <th class="ps-4">Description</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th class="pe-4">Location</th>
                  <th class="text-end pe-4">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(reports)}">
                  <td colspan="5" class="text-center text-muted py-5">No pending reports.</td>
                </tr>
                <tr th:each="r : ${reports}">
                  <td class="ps-4">
                    <span th:text="${r.description}">—</span>
                    <div th:if="${r.imageUrl}" class="small mt-1">
                      <a th:href="${r.imageUrl}" target="_blank" rel="noopener" class="text-decoration-none">
                        <i class="bi bi-image"></i> Image
                      </a>
                    </div>
                  </td>
                  <td><span class="badge text-bg-warning" th:text="${r.status}">PENDING</span></td>
                  <td class="text-muted small">
                    <span th:if="${r.createdAt != null}" th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm')}">—</span>
                    <span th:if="${r.createdAt == null}">—</span>
                  </td>
                  <td class="pe-4 small text-muted">
                    <span th:if="${r.latitude != null and r.longitude != null}"
                          th:text="|${#numbers.formatDecimal(r.latitude, 1, 5)}, ${#numbers.formatDecimal(r.longitude, 1, 5)}|">—</span>
                    <span th:if="${r.latitude == null or r.longitude == null}">—</span>
                  </td>
                  <td class="text-end pe-4">
                    <form th:action="@{/admin/reports/{id}/resolve(id=${r.id})}" method="post" class="d-inline">
                      <button type="submit" class="btn btn-sm btn-success">
                        <i class="bi bi-check2-circle me-1"></i> Approve / Resolve
                      </button>
                    </form>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
