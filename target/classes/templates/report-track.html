<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Track Requests</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="mobile-app-shell min-vh-100">
  <main class="px-3 pb-4">
    <div class="track-headerbar">
      <div class="track-topbar">
      <div>
        <h1 class="track-title mb-1">Request Tracking</h1>
        <p class="track-subtitle mb-0">Your updates</p>
      </div>
      <a class="btn btn-outline-dark btn-mobile-secondary" th:href="@{/report}" href="/report">Back</a>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(requests)}" class="card mobile-card">
      <div class="card-body p-4 text-center">
        <p class="mb-0 text-secondary">No requests submitted yet.</p>
      </div>
    </div>

    <div th:if="${!#lists.isEmpty(requests)}" class="d-flex flex-column gap-3">
      <div class="card mobile-card track-card" th:each="req : ${requests}">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-start gap-2">
            <p class="mb-2 fw-semibold text-dark track-desc" th:text="${req.description}">Description</p>
            <span class="track-status" th:classappend="${req.status == 'RESOLVED'} ? ' status-resolved' : ' status-pending'" th:text="${req.status}">PENDING</span>
          </div>
          <div class="track-meta-grid">
            <div>
              <span class="track-label">Created</span>
              <p class="mb-0 track-value" th:text="${req.createdAt != null ? #temporals.format(req.createdAt, 'dd MMM yyyy, hh:mm a') : '-'}">-</p>
            </div>
            <div>
              <span class="track-label">Resolved</span>
              <p class="mb-0 track-value" th:text="${req.resolvedAt != null ? #temporals.format(req.resolvedAt, 'dd MMM yyyy, hh:mm a') : 'Pending'}">Pending</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
